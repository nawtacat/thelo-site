<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEEPSAKE | Canvas Creator</title>
    <!-- MusicKit JS -->
    <script src="https://js-cdn.music.apple.com/musickit/v3/musickit.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --text-color: #f4f1ea;
            --accent-color: #d4af37;
            --secondary-bg: #161616;
            --border-color: #2a2a2a;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .creator-container {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            width: 95vw;
            height: 90vh;
            gap: 20px;
            background: var(--secondary-bg);
            border: 1px solid var(--border-color);
            padding: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* --- Left Side: Preview (The Canvas) --- */
        .preview-pane {
            position: relative;
            background: #000;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            border: 1px solid var(--border-color);
        }

        #canvas-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
            transition: opacity 0.5s ease;
        }

        .canvas-overlay {
            position: relative;
            z-index: 2;
            padding: 60px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
        }

        #preview-script {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            line-height: 1.3;
            margin-bottom: 20px;
            max-width: 80%;
        }

        .track-info {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 0.9rem;
            opacity: 0;
            transition: 0.5s;
        }

        .track-info.active { opacity: 1; }

        .play-indicator {
            width: 30px;
            height: 30px;
            border: 1px solid var(--accent-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-color);
            font-size: 10px;
        }

        /* --- Right Side: Controls --- */
        .controls-pane {
            padding: 20px;
            overflow-y: auto;
            border-left: 1px solid var(--border-color);
        }

        h2 { font-family: 'Playfair Display', serif; color: var(--accent-color); margin-bottom: 30px; }

        .control-group { margin-bottom: 25px; }

        label { display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; color: #888; }

        input[type="text"], textarea {
            width: 100%;
            background: #000;
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 12px;
            font-family: inherit;
        }

        .file-input-wrapper {
            border: 1px dashed var(--border-color);
            padding: 20px;
            text-align: center;
            cursor: pointer;
        }

        .search-results {
            margin-top: 10px;
            max-height: 200px;
            overflow-y: auto;
            background: #000;
        }

        .search-item {
            padding: 10px;
            border-bottom: 1px solid #1a1a1a;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .search-item:hover { background: #222; color: var(--accent-color); }

        .publish-btn {
            width: 100%;
            padding: 15px;
            background: none;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 20px;
        }

        .publish-btn:hover { background: var(--accent-color); color: #000; }

        /* Timer for 20s constraint */
        #music-timer { font-size: 0.7rem; color: var(--accent-color); }

    </style>
</head>
<body>

<div class="creator-container">
    <!-- Preview Area -->
    <div class="preview-pane" id="preview-pane">
        <img id="canvas-bg" src="" style="display:none;">
        <div class="canvas-overlay">
            <div id="preview-script">Begin your story...</div>
            <div class="track-info" id="track-ui">
                <div class="play-indicator">▶</div>
                <div>
                    <div id="preview-song-title" style="font-weight: 600;">Song Title</div>
                    <div id="preview-artist" style="font-size: 0.8rem; opacity: 0.7;">Artist Name</div>
                    <div id="music-timer">0:00 / 0:20</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Interface Area -->
    <div class="controls-pane">
        <h2>Create Canvas</h2>
        
        <div class="control-group">
            <label>1. Visual Memory</label>
            <div class="file-input-wrapper" onclick="document.getElementById('photo-input').click()">
                Click to Upload Photo
                <input type="file" id="photo-input" hidden accept="image/*">
            </div>
        </div>

        <div class="control-group">
            <label>2. The Script</label>
            <textarea id="script-input" rows="4" placeholder="What does this moment feel like?"></textarea>
        </div>

        <div class="control-group">
            <label>3. Apple Music Soundtrack (20s Preview)</label>
            <input type="text" id="music-search" placeholder="Search for a song...">
            <div class="search-results" id="search-results"></div>
        </div>

        <button class="publish-btn">Add to Gallery</button>
    </div>
</div>

<audio id="audio-player"></audio>

<script>
    // --- 1. CONFIGURATION ---
    const DEVELOPER_TOKEN = 'YOUR_APPLE_MUSIC_TOKEN_HERE'; // Replace with real token for live API
    let musicPlayer = document.getElementById('audio-player');
    let previewDuration = 20; // 20-second limit

    // --- 2. IMAGE UPLOAD ---
    document.getElementById('photo-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = document.getElementById('canvas-bg');
                img.src = event.target.result;
                img.style.display = 'block';
            }
            reader.readAsDataURL(file);
        }
    });

    // --- 3. SCRIPT UPDATE ---
    document.getElementById('script-input').addEventListener('input', function(e) {
        document.getElementById('preview-script').innerText = e.target.value || "Begin your story...";
    });

    // --- 4. MUSIC SEARCH (Simulated for Demo / Structured for MusicKit) ---
    const searchInput = document.getElementById('music-search');
    const resultsContainer = document.getElementById('search-results');

    // MOCK DATA for standalone functionality
    const mockTracks = [
        { title: "Gymnopédie No. 1", artist: "Erik Satie", previewUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
        { title: "Claire de Lune", artist: "Claude Debussy", previewUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
        { title: "Midnight City", artist: "M83", previewUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" }
    ];

    searchInput.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        resultsContainer.innerHTML = '';
        
        if (query.length > 2) {
            // In real app: music.api.catalog.search(query, { types: 'songs', limit: 5 })
            const filtered = mockTracks.filter(t => t.title.toLowerCase().includes(query) || t.artist.toLowerCase().includes(query));
            
            filtered.forEach(track => {
                const div = document.createElement('div');
                div.className = 'search-item';
                div.innerText = `${track.title} — ${track.artist}`;
                div.onclick = () => selectTrack(track);
                resultsContainer.appendChild(div);
            });
        }
    });

    function selectTrack(track) {
        // UI Updates
        document.getElementById('preview-song-title').innerText = track.title;
        document.getElementById('preview-artist').innerText = track.artist;
        document.getElementById('track-ui').classList.add('active');
        resultsContainer.innerHTML = '';
        searchInput.value = track.title;

        // Play Logic
        musicPlayer.src = track.previewUrl;
        musicPlayer.play();
        
        // 20 Second Constraint
        musicPlayer.ontimeupdate = () => {
            const current = Math.floor(musicPlayer.currentTime);
            document.getElementById('music-timer').innerText = `0:${current < 10 ? '0'+current : current} / 0:${previewDuration}`;
            
            if (musicPlayer.currentTime >= previewDuration) {
                musicPlayer.pause();
                musicPlayer.currentTime = 0;
            }
        };
    }

    // --- 5. MUSICKIT INITIALIZATION (Conceptual) ---
    /*
    document.addEventListener('musickitloaded', async () => {
        try {
            await MusicKit.configure({
                developerToken: DEVELOPER_TOKEN,
                app: { name: 'Keepsake', build: '1.0.0' }
            });
        } catch (err) {
            console.log("MusicKit restricted: Using simulated mode.");
        }
    });
    */
</script>

</body>
</html>
