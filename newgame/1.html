<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wasteland Village Defense</title>
    <style>
        body {
            margin: 0; background-color: #1a1a1a; color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; user-select: none;
        }
        #ui-container {
            width: 800px; display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px; background: #2c2c2c; padding: 10px; border: 2px solid #555;
        }
        canvas {
            border: 4px solid #4a3c31; background-color: #c2b280; /* Desert Sand */
            box-shadow: 0px 10px 20px rgba(0,0,0,0.8); cursor: crosshair;
        }
        .health-bar { width: 150px; height: 15px; background: #555; border: 2px solid #222; }
        .health-fill { height: 100%; background: #e67e22; width: 100%; transition: width 0.2s; }
        .overlay { position: absolute; background: rgba(0,0,0,0.8); padding: 20px; border: 2px solid #c2b280; text-align: center; }
        button { padding: 10px 20px; font-size: 16px; background: #b05a3e; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #8a3b22; }
    </style>
</head>
<body>

<div id="ui-container">
    <div>
        <h2 style="margin: 0; color: #e67e22;">THE SCRAPYARD</h2>
        <div style="font-size: 12px; color: #aaa;">WASD: Move | Click: Attack | Defend the Saloon!</div>
    </div>
    <div style="text-align: right;">
        Score: <span id="scoreVal">0</span> | Wave: <span id="waveVal">1</span>
        <div style="font-size: 14px; margin-top: 5px;">Saloon HQ Health</div>
        <div class="health-bar"><div id="hqHealth" class="health-fill"></div></div>
    </div>
</div>

<div id="menu" class="overlay">
    <h1 style="color: #e67e22; margin-top:0;">WASTELAND SURVIVAL</h1>
    <p>The canyon is blocked. They are coming from the North.</p>
    <select id="roleSelect" style="padding: 5px; font-size: 16px; margin-bottom: 15px; background: #333; color: white;">
        <option value="Bulwark">Scrapper (Heavy Melee, 150 HP)</option>
        <option value="Fletcher">Drifter (Ranged Rifle, 90 HP)</option>
    </select><br>
    <button onclick="startGame()">Start Defense</button>
</div>

<canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Game State
let gameRunning = false; let score = 0; let wave = 1; let frameCount = 0;
const keys = {}; const mouse = { x: 0, y: 0, down: false };

window.addEventListener("keydown", e => keys[e.code] = true);
window.addEventListener("keyup", e => keys[e.code] = false);
canvas.addEventListener("mousemove", e => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left; mouse.y = e.clientY - rect.top;
});
canvas.addEventListener("mousedown", () => mouse.down = true);
canvas.addEventListener("mouseup", () => mouse.down = false);

// --- MAP & ENVIRONMENT DATA ---
const mapObjects = [];
class MapStructure {
    constructor(name, x, y, w, h, color, isDestructible, maxHp) {
        this.name = name; this.x = x; this.y = y; this.w = w; this.h = h;
        this.color = color; this.isDestructible = isDestructible; 
        this.maxHp = maxHp; this.hp = maxHp;
    }
    draw() {
        if (this.hp <= 0 && this.isDestructible) return; // Destroyed
        
        // Shadow
        ctx.fillStyle = "rgba(0,0,0,0.4)";
        ctx.fillRect(this.x, this.y + this.h - 5, this.w, 10);
        
        // Base structure
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.w, this.h);
        ctx.strokeStyle = "#222"; ctx.lineWidth = 2;
        ctx.strokeRect(this.x, this.y, this.w, this.h);

        // Details based on type
        if (this.name.includes("Gate")) {
            ctx.fillStyle = "#333";
            ctx.fillRect(this.x, this.y + this.h/2 - 2, this.w, 4); // Iron bar
            // Health bar for gates
            if (this.hp < this.maxHp) {
                ctx.fillStyle = "red"; ctx.fillRect(this.x, this.y - 10, this.w, 4);
                ctx.fillStyle = "#2ecc71"; ctx.fillRect(this.x, this.y - 10, this.w * (this.hp/this.maxHp), 4);
            }
        }
        if (this.name === "The Saloon (HQ)") {
            ctx.fillStyle = "#5c4033"; // Dark wood roof
            ctx.fillRect(this.x - 10, this.y - 20, this.w + 20, 40);
            ctx.fillStyle = "#e67e22"; ctx.font = "14px Courier"; ctx.fillText("SALOON", this.x + 55, this.y + 10);
        }
    }
}

// Build the Canyon
function initMap() {
    mapObjects.length = 0;
    // Walls
    mapObjects.push(new MapStructure("Left Canyon Wall", 0, 150, 250, 40, "#5c5448", false, null));
    mapObjects.push(new MapStructure("Center Rock Pile", 330, 150, 140, 40, "#5c5448", false, null));
    mapObjects.push(new MapStructure("Right Canyon Wall", 550, 150, 250, 40, "#5c5448", false, null));
    // Destructible Gates
    mapObjects.push(new MapStructure("Gate 1", 250, 150, 80, 30, "#8a3b22", true, 300));
    mapObjects.push(new MapStructure("Gate 2", 470, 150, 80, 30, "#8a3b22", true, 300));
    // Buildings
    mapObjects.push(new MapStructure("Rusty Car Wreck", 100, 250, 90, 50, "#7a4b3a", false, null));
    mapObjects.push(new MapStructure("The Saloon (HQ)", 320, 400, 160, 100, "#8b5a2b", true, 1000));
}

// --- ENTITIES ---
let player; let enemies = []; let projectiles = []; let particles = [];

class Player {
    constructor(role) {
        this.x = 400; this.y = 550; this.radius = 14;
        this.role = role; this.attackCooldown = 0;
        if (role === "Bulwark") { this.speed = 3; this.color = "#2c3e50"; this.maxCd = 25; } 
        else { this.speed = 4.5; this.color = "#7d6608"; this.maxCd = 12; }
    }
    update() {
        let dx = 0; let dy = 0;
        if (keys["KeyA"]) dx -= 1; if (keys["KeyD"]) dx += 1;
        if (keys["KeyW"]) dy -= 1; if (keys["KeyS"]) dy += 1;
        if (dx !== 0 && dy !== 0) { let len = Math.sqrt(dx*dx + dy*dy); dx /= len; dy /= len; }

        // Move X and Check Collision
        this.x += dx * this.speed;
        if (this.checkMapCollision()) this.x -= dx * this.speed;
        
        // Move Y and Check Collision
        this.y += dy * this.speed;
        if (this.checkMapCollision()) this.y -= dy * this.speed;

        this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x));
        this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, this.y));
        this.angle = Math.atan2(mouse.y - this.y, mouse.x - this.x);

        if (this.attackCooldown > 0) this.attackCooldown--;
        if (mouse.down && this.attackCooldown === 0) { this.attack(); this.attackCooldown = this.maxCd; }
    }
    
    checkMapCollision() {
        // Simple AABB Collision against solid map objects
        for (let obj of mapObjects) {
            if (obj.isDestructible && obj.hp <= 0) continue;
            let closestX = Math.max(obj.x, Math.min(this.x, obj.x + obj.w));
            let closestY = Math.max(obj.y, Math.min(this.y, obj.y + obj.h));
            let distanceX = this.x - closestX;
            let distanceY = this.y - closestY;
            if ((distanceX * distanceX) + (distanceY * distanceY) < (this.radius * this.radius)) return true;
        }
        return false;
    }

    attack() {
        if (this.role === "Bulwark") {
            let reach = 40; let hitAngle = Math.PI / 1.5;
            spawnParticles(this.x + Math.cos(this.angle)*reach, this.y + Math.sin(this.angle)*reach, "#bdc3c7", 10, this.angle);
            enemies.forEach(e => {
                let dist = Math.hypot(e.x - this.x, e.y - this.y);
                let angleDiff = Math.abs(Math.atan2(e.y - this.y, e.x - this.x) - this.angle);
                if (angleDiff > Math.PI) angleDiff = 2 * Math.PI - angleDiff;
                if (dist < reach + e.radius && angleDiff < hitAngle/2) {
                    e.hp -= 50; e.x += Math.cos(this.angle)*15; e.y += Math.sin(this.angle)*15;
                    spawnParticles(e.x, e.y, "#a93226", 5);
                }
            });
        } else {
            projectiles.push({
                x: this.x + Math.cos(this.angle)*20, y: this.y + Math.sin(this.angle)*20,
                vx: Math.cos(this.angle)*14, vy: Math.sin(this.angle)*14, radius: 3, life: 60
            });
        }
    }

    draw() {
        ctx.save(); ctx.translate(this.x, this.y);
        ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.beginPath(); ctx.ellipse(0, 10, 16, 6, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        ctx.rotate(this.angle);
        ctx.fillStyle = "#7f8c8d"; ctx.fillRect(5, -4, 20, 8); // Weapon
        ctx.restore();
    }
}

class Enemy {
    constructor() {
        this.x = Math.random() * 700 + 50; this.y = -30; // Spawn up North
        this.radius = 12; this.hp = 40 + (wave * 10); this.speed = 0.8 + Math.random()*0.8;
        this.color = "#1e8449"; // Mutated Raider green
    }
    update() {
        // Pathfind towards the Saloon (Target = 400, 450)
        let targetX = 400; let targetY = 450;
        let angle = Math.atan2(targetY - this.y, targetX - this.x);
        
        let dx = Math.cos(angle) * this.speed;
        let dy = Math.sin(angle) * this.speed;

        this.x += dx;
        let hitObj = this.checkMapCollision();
        if (hitObj) {
            this.x -= dx;
            // If the object is destructible (Gate or Saloon), attack it!
            if (hitObj.isDestructible) {
                if (frameCount % 30 === 0) { 
                    hitObj.hp -= 5; 
                    spawnParticles(hitObj.x + hitObj.w/2, hitObj.y, "#f39c12", 2);
                }
            } else {
                // Slide along unbreakable walls
                this.x += (this.x < 400 ? 1 : -1) * this.speed; 
            }
        }

        this.y += dy;
        hitObj = this.checkMapCollision();
        if (hitObj) this.y -= dy;
    }

    checkMapCollision() {
        for (let obj of mapObjects) {
            if (obj.isDestructible && obj.hp <= 0) continue;
            let closestX = Math.max(obj.x, Math.min(this.x, obj.x + obj.w));
            let closestY = Math.max(obj.y, Math.min(this.y, obj.y + obj.h));
            let distX = this.x - closestX; let distY = this.y - closestY;
            if ((distX * distX) + (distY * distY) < (this.radius * this.radius)) return obj;
        }
        return null;
    }

    draw() {
        ctx.save(); ctx.translate(this.x, this.y);
        ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.beginPath(); ctx.ellipse(0, 10, 12, 5, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        let angleToSaloon = Math.atan2(450 - this.y, 400 - this.x);
        ctx.fillStyle = "#c0392b";
        ctx.fillRect(Math.cos(angleToSaloon)*6 - 2, Math.sin(angleToSaloon)*6 - 2, 4, 4);
        ctx.restore();
    }
}

function spawnParticles(x, y, color, count, directionAngle = null) {
    for (let i=0; i<count; i++) {
        let angle = directionAngle !== null ? directionAngle + (Math.random()-0.5) : Math.random()*Math.PI*2;
        let speed = Math.random()*3 + 1;
        particles.push({ x: x, y: y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, life: 15+Math.random()*10, color: color });
    }
}

function triggerWave() {
    wave++; document.getElementById("waveVal").innerText = wave;
    let spawnCount = 8 + (wave * 4);
    for (let i=0; i<spawnCount; i++) {
        setTimeout(() => { if(gameRunning) enemies.push(new Enemy()); }, i * 600);
    }
}

function startGame() {
    document.getElementById("menu").style.display = "none";
    player = new Player(document.getElementById("roleSelect").value);
    enemies = []; projectiles = []; particles = []; score = 0; wave = 1;
    initMap();
    for(let i=0; i<8; i++) enemies.push(new Enemy());
    gameRunning = true; requestAnimationFrame(gameLoop);
}

function gameLoop() {
    if (!gameRunning) return;
    frameCount++;

    // Background (Desert Dirt)
    ctx.fillStyle = "#c2b280"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    // Draw some random desert grit/rocks procedurally
    ctx.fillStyle = "#a89a6c";
    for(let i=0; i<20; i++) ctx.fillRect((i*97)%800, (i*131)%600, 3, 3);

    player.update();

    // Projectiles
    for (let i = projectiles.length - 1; i >= 0; i--) {
        let p = projectiles[i]; p.x += p.vx; p.y += p.vy; p.life--;
        let hit = false;
        // Hit Enemies
        for (let j = enemies.length - 1; j >= 0; j--) {
            if (Math.hypot(p.x - enemies[j].x, p.y - enemies[j].y) < enemies[j].radius + p.radius) {
                enemies[j].hp -= 35; spawnParticles(p.x, p.y, "#f39c12", 4); hit = true; break;
            }
        }
        // Hit Walls
        for (let obj of mapObjects) {
            if (obj.isDestructible && obj.hp <= 0) continue;
            if (p.x > obj.x && p.x < obj.x+obj.w && p.y > obj.y && p.y < obj.y+obj.h) {
                spawnParticles(p.x, p.y, "#bdc3c7", 3); hit = true; break;
            }
        }
        if (hit || p.life <= 0) projectiles.splice(i, 1);
    }

    // Enemies
    for (let i = enemies.length - 1; i >= 0; i--) {
        enemies[i].update();
        if (enemies[i].hp <= 0) {
            spawnParticles(enemies[i].x, enemies[i].y, "#1e8449", 8);
            enemies.splice(i, 1); score += 50; document.getElementById("scoreVal").innerText = score;
        }
    }
    if (enemies.length === 0) triggerWave();

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
        let pt = particles[i]; pt.x += pt.vx; pt.y += pt.vy; pt.life--;
        if (pt.life <= 0) particles.splice(i, 1);
    }

    // --- RENDERING (Y-Sorting) ---
    // Draw base map objects first, then dynamic entities sorted by Y
    mapObjects.forEach(obj => obj.draw());
    
    let entities = [player, ...enemies];
    entities.sort((a, b) => a.y - b.y);
    entities.forEach(ent => ent.draw());

    projectiles.forEach(p => { ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill(); });
    particles.forEach(pt => { ctx.fillStyle = pt.color; ctx.fillRect(pt.x, pt.y, 3, 3); });

    // UI Updates
    let saloon = mapObjects.find(o => o.name === "The Saloon (HQ)");
    if (saloon) {
        let hpPercent = Math.max(0, (saloon.hp / saloon.maxHp) * 100);
        document.getElementById("hqHealth").style.width = hpPercent + "%";
        if (saloon.hp <= 0) {
            gameRunning = false;
            document.getElementById("menu").style.display = "block";
            document.querySelector("#menu h1").innerText = "THE SALOON FELL";
            document.querySelector("#menu p").innerText = "Final Score: " + score;
        }
    }

    if (gameRunning) requestAnimationFrame(gameLoop);
}
</script>
</body>
</html>
