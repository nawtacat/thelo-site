<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zebra Stripe Reader</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            margin: 20px;
            background-color: #fff;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 20px;
        }

        button:hover {
            background-color: #0056b3;
        }

        #output {
            border: 1px solid #ddd;
            border-radius: 4px;
            overflow: hidden;
        }

        .line {
            padding: 4px 12px;
            min-height: 1.6em;
            white-space: pre-wrap; /* Maintains spacing and indentation */
            word-wrap: break-word;
        }

        /* The zebra striping logic */
        .line:nth-child(odd) {
            background-color: #f2f2f2; /* Light Gray */
        }

        .line:nth-child(even) {
            background-color: #ffffff; /* White */
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Line Highlighter</h2>
    <p>Paste your text below to view it with alternating line backgrounds.</p>
    
    <textarea id="textInput" placeholder="Paste your text here..."></textarea>
    <br>
    <button onclick="formatText()">Apply Striping</button>

    <div id="output"></div>
</div>

<script>
    function formatText() {
        const input = document.getElementById('textInput').value;
        const output = document.getElementById('output');
        
        // Clear previous output
        output.innerHTML = '';

        // Split text by new lines
        const lines = input.split('\n');

        lines.forEach(lineText => {
            const lineDiv = document.createElement('div');
            lineDiv.className = 'line';
            
            // If the line is empty, add a non-breaking space so the background still renders
            lineDiv.textContent = lineText === '' ? ' ' : lineText;
            
            output.appendChild(lineDiv);
        });
    }
</script>

</body>
</html>
