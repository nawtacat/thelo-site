<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>True Line Reader</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 40px;
            background-color: #f9f9f9;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        textarea {
            width: 100%;
            height: 120px;
            margin-bottom: 15px;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            padding: 10px 25px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 30px;
        }

        /* THE MAGIC PART */
        #displayArea {
            /* 1. Set a fixed line height */
            line-height: 32px; 
            font-size: 18px;
            
            /* 2. Create the striped background */
            /* 50% light gray, 50% white */
            background-image: linear-gradient(#eeeeee 50%, #ffffff 50%);
            
            /* 3. Set the background size to exactly TWICE the line height */
            background-size: 100% 64px; 
            
            /* 4. Ensure background scrolls with the text */
            background-attachment: local;
            
            padding: 0 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: #222;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>True Line Highlighter</h2>
    <textarea id="input" placeholder="Paste your text here..."></textarea>
    <br>
    <button onclick="updateText()">Show Striped Text</button>

    <div id="displayArea">Your text will appear here with striped lines...</div>
</div>

<script>
    function updateText() {
        const text = document.getElementById('input').value;
        const display = document.getElementById('displayArea');
        
        // We just put the raw text in; the CSS background handles the rest!
        display.textContent = text;
    }
</script>

</body>
</html>
